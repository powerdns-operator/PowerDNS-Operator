---
# Credentials the operator uses to reach the in-cluster PowerDNS API.
# Consumed by config/default/manager_env_patch.yaml (envFrom secretRef).
apiVersion: v1
kind: Secret
metadata:
  name: powerdns-operator-manager
  namespace: powerdns-operator-system
type: Opaque
stringData:
  PDNS_API_URL: http://powerdns.powerdns.svc.cluster.local:8081
  PDNS_API_KEY: e2e-test-api-key
  PDNS_API_VHOST: localhost
