name: E2E

on:
  # Run on demand and nightly to keep PR CI fast.
  workflow_dispatch: {}
  schedule:
    - cron: "0 2 * * *"
  # Also run on PRs that carry the 'run-e2e' label.
  pull_request:
    types: [labeled, opened, synchronize, reopened]

env:
  KIND_VERSION: 'v0.30.0'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Only run for scheduled/manual triggers, or PRs labeled 'run-e2e'.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        id: setup-go
        with:
          go-version-file: "go.mod"

      - name: Download Go modules
        if: ${{ steps.setup-go.outputs.cache-hit != 'true' }}
        run: go mod download

      - name: Install Kind
        run: |
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Run E2E Tests
        run: make test-e2e
